spring.application.name=agentapp

# Database bağlantı ayarları
spring.datasource.url=jdbc:postgresql://localhost:5432/agentadb
spring.datasource.username=postgres
spring.datasource.password=Bf051102!
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ayarları
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging ayarları
logging.level.com.example.agentapp=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server ayarları
server.port=8080
server.error.include-message=always
server.error.include-stacktrace=on_param

# JWT
jwt.secret=YourSecretKeyHere256BitsLong
jwt.expiration=86400000
jwt.refresh-expiration=604800000